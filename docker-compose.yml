version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mock_interview_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ai_mock_interview}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    networks:
      - interview_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mock_interview_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_secure_pass}@db:5432/${POSTGRES_DB:-ai_mock_interview}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/storage/resumes}
    volumes:
      - ./backend:/app
      - resume_storage:${UPLOAD_DIR:-/app/storage/resumes}
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - interview_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mock_interview_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - interview_network

volumes:
  postgres_data:
    driver: local
  resume_storage:
    driver: local

networks:
  interview_network:
    driver: bridge
